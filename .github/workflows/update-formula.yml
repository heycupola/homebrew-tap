  name: Update Formula
  on:
    repository_dispatch:
      types: [formula-update]
  jobs:
    update:
      name: Update relic formula
      runs-on: ubuntu-latest
      permissions:
        contents: write
      steps:
        - uses: actions/checkout@v4
        - name: Update Formula/relic.rb
          run: |
            VERSION="${{ github.event.client_payload.version }}"
            SHA_DARWIN_ARM64="${{ github.event.client_payload.sha_darwin_arm64 }}"
            SHA_DARWIN_X64="${{ github.event.client_payload.sha_darwin_x64 }}"
            SHA_LINUX_X64="${{ github.event.client_payload.sha_linux_x64 }}"
            cat > Formula/relic.rb << 'FORMULA'
            # typed: false
            # frozen_string_literal: true
            class Relic < Formula
              desc "End-to-end encrypted secret layer for developers"
              homepage "https://relic.so"
              version "VERSION_PLACEHOLDER"
              license "MIT"
              on_macos do
                if Hardware::CPU.arm?
                  url "https://github.com/heycupola/relic/releases/download/v#{version}/relic-darwin-arm64.tar.gz"
                  sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"
                else
                  url "https://github.com/heycupola/relic/releases/download/v#{version}/relic-darwin-x64.tar.gz"
                  sha256 "SHA_DARWIN_X64_PLACEHOLDER"
                end
              end
              on_linux do
                if Hardware::CPU.intel?
                  url "https://github.com/heycupola/relic/releases/download/v#{version}/relic-linux-x64.tar.gz"
                  sha256 "SHA_LINUX_X64_PLACEHOLDER"
                end
              end
              def install
                bin.install "relic"
                lib.install Dir["librelic_runner.*"]
                lib.install Dir["relic_runner.dll"] if OS.windows?
              end
              test do
                assert_match version.to_s, shell_output("#{bin}/relic --version")
              end
            end
            FORMULA
            sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Formula/relic.rb
            sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${SHA_DARWIN_ARM64}/g" Formula/relic.rb
            sed -i "s/SHA_DARWIN_X64_PLACEHOLDER/${SHA_DARWIN_X64}/g" Formula/relic.rb
            sed -i "s/SHA_LINUX_X64_PLACEHOLDER/${SHA_LINUX_X64}/g" Formula/relic.rb
        - name: Commit and push
          run: |
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Formula/relic.rb
            git commit -m "chore: update relic to v${{ github.event.client_payload.version }}"
            git push

